# Storm Guardian — Hermes Agent Configuration
# An AI weather sentinel built on a pure-Rust weather platform.

model:
  provider: openai  # vLLM exposes an OpenAI-compatible API
  base_url: "http://localhost:5000/v1"
  model: "nvidia/nemotron-3-super"
  # api_key set via OPENAI_API_KEY env var (vLLM accepts any non-empty string)

identity:
  name: Storm Guardian
  description: >
    I am Storm Guardian, an AI weather sentinel built on a 50K+ LOC pure-Rust
    weather platform. I have 20 MCP tools that access NEXRAD radar, GRIB2 model
    data, NWS products, XYZ tile generation, METAR stations, and global weather.
    I can generate live map views, stream real-time events, and deliver
    plain-English weather intelligence. I learn what you care about and keep you safe.
  soul: ./SOUL.md

memory:
  enabled: true
  user_modeling: true
  user_profile: ./USER.md

skills:
  directory: ../skills/
  auto_evolve: true  # Agent can write new skills when it solves novel problems

cron:
  - name: morning_briefing
    schedule: "0 6 * * *"  # 6 AM daily
    prompt: "Generate a morning weather briefing for the user."

  - name: severe_check
    schedule: "*/30 * * * *"  # Every 30 minutes
    prompt: "Check for severe weather alerts at the user's location. Only notify if there are active warnings or watches."

  - name: evening_summary
    schedule: "0 20 * * *"  # 8 PM daily
    prompt: "Give a brief overnight weather summary and tomorrow's outlook."

  - name: fire_weather_check
    schedule: "0 12 * * *"  # Noon daily (peak fire weather time)
    prompt: "Check fire weather conditions. Alert if RH is below 20% or Red Flag Warnings are active."

gateway:
  telegram:
    enabled: true
    # token set via TELEGRAM_BOT_TOKEN env var
    # chat_id set via TELEGRAM_CHAT_ID env var
    parse_mode: markdown

mcp_servers:
  wx-tools:
    command: "wx-mcp"
    args: []
    # 20 MCP tools available, organized by data cost:
    #
    # --- Lightweight (< 50KB) ---
    #   wx_conditions  - Current observations (~6KB)
    #   wx_alerts      - Active NWS alerts for a location (~10KB)
    #   wx_hazards     - Categorized hazard assessment (~20KB)
    #   wx_station     - Station info and metadata (~5KB)
    #   wx_metar       - Raw/decoded METAR observations (~3KB)
    #
    # --- Medium (50-200KB) ---
    #   wx_brief       - Quick conditions + forecast (~50KB)
    #   wx_forecast    - Hourly/daily forecast (~50KB)
    #   wx_global      - Global weather via Open-Meteo (~30KB)
    #   wx_history     - Historical weather data (~40KB)
    #   wx_severe      - Full SPC/severe weather analysis (~200KB)
    #
    # --- Heavy (1MB+) ---
    #   wx_radar       - NEXRAD composite (~15MB, use sparingly)
    #   wx_briefing    - Comprehensive weather briefing (~15MB)
    #
    # --- Visualization ---
    #   wx_tiles       - Generate XYZ map tiles (~50KB per tile)
    #   wx_radar_image - Rendered NEXRAD PPI as PNG
    #   wx_model_image - Rendered model field as PNG
    #
    # --- Specialized ---
    #   wx_point       - Single grid-point value extraction
    #   wx_scan        - Grid extrema search (max CAPE, min pressure)
    #   wx_timeseries  - Multi-hour trend for a variable at a point
    #   wx_sounding    - Upper-air sounding data
    #   wx_evidence    - Multi-source confidence assessment
