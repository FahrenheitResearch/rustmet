name: Benchmarks
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmarks
        run: cargo bench -- --output-format bencher 2>&1 | tee bench_output.txt
